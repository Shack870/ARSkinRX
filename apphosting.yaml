# Firebase App Hosting configuration for ARSkinRX (Next.js SSR).
# Deploy:  firebase deploy --only apphosting   (after `firebase init apphosting`)
#
# The Admin SDK reads its service-account key from the FIREBASE_SERVICE_ACCOUNT_BASE64
# secret (in Cloud Secret Manager) so all admin operations work reliably.
#
# Secret values (Stripe, TURN, Twilio, Resend, CRON) must be stored in Cloud
# Secret Manager and referenced below. Create them with, e.g.:
#   firebase apphosting:secrets:set stripe-secret-key
#   firebase apphosting:secrets:set stripe-webhook-secret
#   firebase apphosting:secrets:set turn-credential
# then grant access:
#   firebase apphosting:secrets:grantaccess stripe-secret-key --backend <backend-id>

runConfig:
  minInstances: 0
  maxInstances: 4
  concurrency: 80
  cpu: 1
  memoryMiB: 512

env:
  # Public Firebase web config (safe to expose; needed at build + runtime).
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyD3u1pdersrDNxRzrEBs9cR8S73D_KGZn0
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: arskinrx.firebaseapp.com
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: arskinrx
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: arskinrx.firebasestorage.app
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "229240859988"
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: 1:229240859988:web:c244886d477934a3492cc1
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_APP_URL
    value: https://arskin--arskinrx.us-east4.hosted.app
    availability: [BUILD, RUNTIME]

  # Server-side Admin SDK credentials (stored in Cloud Secret Manager).
  - variable: FIREBASE_SERVICE_ACCOUNT_BASE64
    secret: FIREBASE_SERVICE_ACCOUNT_BASE64
    availability: [RUNTIME]

  # Shared secret for the maintenance sweep cron (Cloud Scheduler).
  - variable: CRON_SECRET
    secret: CRON_SECRET
    availability: [RUNTIME]

  # ── Secrets (uncomment once created in Secret Manager) ──
